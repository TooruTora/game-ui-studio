name: Quartermaster CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found — skipping npm ci (zero external deps)"
          fi
        working-directory: quartermaster

      - name: Run unit tests
        run: node --test test/unit/
        working-directory: quartermaster

  # L3 전수검증: test/fixtures/manifests/*.manifest.json 전체를
  # validate-manifest로 재검증 — MCP 직접조립 우회경로도 CI가 잡음.
  # D0.2 § L3 참조.
  l3-full-manifest-validation:
    name: L3 Full Manifest Validation (all *.manifest.json)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json — zero external deps"
          fi
        working-directory: quartermaster

      - name: L3 — Validate all manifest fixtures
        # Runs validate-manifest on every *.manifest.json under test/fixtures/manifests/
        # Valid manifests (no "invalid-" prefix) must exit 0.
        # Invalid fixtures (prefix "invalid-") must exit 2 (rejected).
        # If validate-manifest.mjs is not yet available, step exits with error.
        run: |
          node - <<'EOF'
          import { readFileSync, readdirSync } from 'node:fs';
          import { join, basename } from 'node:path';
          import { createRequire } from 'node:module';
          import { fileURLToPath } from 'node:url';

          // Dynamic import for ESM runtime
          const { validateManifest } = await import('./runtime/validate-manifest.mjs');
          const catalog = JSON.parse(readFileSync('./test/fixtures/catalog.json', 'utf8'));
          const manifestsDir = './test/fixtures/manifests';
          const files = readdirSync(manifestsDir).filter(f => f.endsWith('.manifest.json'));

          let passed = 0;
          let failed = 0;

          for (const file of files) {
            const filePath = join(manifestsDir, file);
            const manifest = JSON.parse(readFileSync(filePath, 'utf8'));
            const isInvalid = basename(file).startsWith('invalid-');
            const result = validateManifest(manifest, catalog);

            if (isInvalid) {
              // Invalid fixtures MUST be rejected
              if (!result.ok) {
                console.log(`[PASS] ${file} → correctly rejected: ${result.errors.map(e=>e.code).join(', ')}`);
                passed++;
              } else {
                console.error(`[FAIL] ${file} → expected rejection but got ok:true`);
                failed++;
              }
            } else {
              // Valid fixtures MUST pass
              if (result.ok) {
                console.log(`[PASS] ${file} → valid`);
                passed++;
              } else {
                console.error(`[FAIL] ${file} → unexpected errors: ${JSON.stringify(result.errors)}`);
                failed++;
              }
            }
          }

          console.log(`\nL3 validation: ${passed} passed, ${failed} failed`);
          if (failed > 0) process.exit(2);
          EOF
        working-directory: quartermaster

      - name: claude plugin validate (optional — skip if not installed)
        run: |
          if command -v claude &> /dev/null; then
            claude plugin validate .
          else
            echo "claude CLI not found — skipping plugin validate step (optional)"
          fi
        working-directory: quartermaster
        continue-on-error: true

  # 카탈로그 검증: examples/catalog.json + test/fixtures/catalog.json을
  # validate-catalog.mjs로 검증 — exit 0 기대. (M2' CI 추가)
  catalog-validation:
    name: Catalog Validation (validate-catalog.mjs)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json — zero external deps"
          fi
        working-directory: quartermaster

      - name: Validate examples/catalog.json
        run: node runtime/validate-catalog.mjs examples/catalog.json
        working-directory: quartermaster

      - name: Validate test/fixtures/catalog.json
        run: node runtime/validate-catalog.mjs test/fixtures/catalog.json
        working-directory: quartermaster

  # JSON fixture self-validation: parse all fixture JSON files
  json-parse-check:
    name: JSON Fixture Parse Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Self-validate all fixture JSON files
        run: |
          node - <<'EOF'
          import { readFileSync, readdirSync, statSync } from 'node:fs';
          import { join } from 'node:path';

          function checkDir(dir) {
            let ok = true;
            for (const entry of readdirSync(dir)) {
              const full = join(dir, entry);
              if (statSync(full).isDirectory()) {
                if (!checkDir(full)) ok = false;
              } else if (entry.endsWith('.json')) {
                try {
                  JSON.parse(readFileSync(full, 'utf8'));
                  console.log(`[OK] ${full}`);
                } catch (e) {
                  console.error(`[FAIL] ${full}: ${e.message}`);
                  ok = false;
                }
              }
            }
            return ok;
          }

          const ok = checkDir('./test/fixtures');
          if (!ok) process.exit(1);
          console.log('\nAll fixture JSON files parsed successfully.');
          EOF
        working-directory: quartermaster
